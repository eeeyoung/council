moderator_curation:
  description: >
    The user has submitted the following scientific research question:

    "{query}"

    Desired symposium outcome: {expectation_context}

    Your task is to design the optimal expert panel to investigate this question.
    The panel should be assembled with the desired outcome in mind — different
    outcomes require different kinds of expertise (e.g., a feasibility plan needs
    engineers and project managers; a balanced overview needs methodologists and
    historians of science).

    FIRST: Use the web search tool to research the current state of this field.
    Identify real sub-disciplines, active research directions, and methodological
    debates relevant to this topic. This will help you generate grounded,
    specific personas rather than generic ones.

    THEN: Generate exactly {max_experts} expert personas. Each expert must bring
    a genuinely distinct disciplinary perspective. Avoid redundancy. Do not
    generate fewer than {max_experts} experts.

    For names: use philosopher-inspired aliases — slightly misspell or blend
    famous thinkers' names for a distinctive, memorable feel. Examples:
    "Socratyes" (Socrates), "Platoueau" (Plato), "Kantwell" (Kant),
    "Arendelle" (Arendt), "Foucavie" (Foucault), "Hypatienne" (Hypatia).
    Each name should hint at their intellectual lineage without being the exact name.

    Respond with ONLY a valid JSON array with no surrounding text or markdown.
    Each object must have these exact fields:
      - name: A philosopher-inspired alias (e.g. "Socratyes", "Kantwell")
      - discipline: Their primary field (e.g. "Theoretical Astrophysics")
      - bias: Their known intellectual leaning or methodological preference
      - persona_prompt: 2-3 sentences describing their personality and approach
  expected_output: >
    A valid JSON array of expert definition objects, with no surrounding text.

expert_collect:
  description: >
    You are {name}, a {discipline} expert.

    Research Question: "{query}"

    PHASE B1 — COLLECTION ONLY. Do NOT form opinions or make claims yet.

    1. Use the web_search tool to find 3-5 highly relevant sources.
    2. For EACH source, deposit it into the Source Pool using source_pool_write:
       - url: the EXACT URL from the search result
       - title: the title of the article/paper
       - snippet: the text excerpt from the search result (copy-paste it)
       - agent_name: {name}
    3. Do NOT use library_write. Do NOT write findings or opinions.
       Just collect sources. The Fact-Checker will verify them next.

  expected_output: >
    A brief confirmation of how many sources were deposited into the pool.

gate_check:
  description: >
    Research Question: "{query}"

    === SOURCE POOL ===
    {source_pool_text}
    === END POOL ===

    PHASE B2 — GATE CHECK. Verify every source in the pool before experts use them.

    For each source in the pool:
    1. Check the URL resolves (try to access it).
    2. Search the web for the title to confirm the source actually exists.
    3. If verified → mark as "verified" and store the finding in the shared
       library using library_write (with the source_quote from the snippet).
    4. If fabricated or unreachable → mark as "rejected" with a reason.

    Return a JSON array of gate results. Each entry must have:
      - "url": the source URL
      - "agent_name": who submitted it
      - "status": "verified" or "rejected"
      - "reason": brief explanation (empty if verified)

  expected_output: >
    A JSON array of gate check results.

expert_analyze:
  description: >
    You are {name}, a {discipline} expert.

    Research Question: "{query}"

    PHASE B3 — ANALYSIS. Now you can form opinions using VERIFIED sources.

    The shared library contains only sources that passed verification.
    Use library_read to find evidence, then:
    1. Extract key findings from the verified sources
    2. Form your evidence-based opinions and preliminary hypothesis
    3. Store each finding in the library using library_write
       (include source_quote — copy the exact sentence from the source)
    4. Produce your structured research summary

  expected_output: >
    A structured research summary using the standard format (see below).

expert_research:
  description: >
    You are {name}, a {discipline} expert.

    Research Question: "{query}"

    Your Task:
    1. Use the search tool to find 3-5 highly relevant recent sources on this topic
       from your disciplinary perspective.
    2. For each source, extract the key finding and copy-paste the EXACT sentence
       from the search result snippet that supports your finding — this is your
       source_quote. Do NOT rephrase or summarise it. The exact text is required.
    3. Store each finding using the library write tool with these fields:
       - content: your key finding
       - source_url: the EXACT URL from your search results
       - source_quote: the EXACT sentence from the source (copy-paste it)
       - agent_name: your name
       - search_reference: e.g. "from search result #2"
       The source_quote is MANDATORY — without it the system cannot verify your source.
    4. Summarize your research findings in a structured report.

    Focus on evidence that YOUR discipline uniquely contributes — avoid duplicating
    what generalist sources would say.
  expected_output: >
    A structured research summary using EXACTLY this markdown format. DO NOT deviate from this structure:

    # Structured Research Summary: [Topic]
    ## [Your Name], [Your Discipline]
    ---

    ## 1. Disciplinary Framing
    [Your framing of the question here]
    ---

    ## 2. Key Findings
    ### Finding 1: [Short Title]
    **Source:** [Primary Source Citation]
    **Supporting Source:** [Secondary Source if any, else "None"]
    **Key Finding:** [Detailed text of the finding]
    **Relevance:** [Why this finding matters to the research question]

    ### Finding 2: [Short Title]
    **Source:** [Primary Source Citation]
    **Supporting Source:** [Secondary Source if any, else "None"]
    **Key Finding:** [Detailed text of the finding]
    **Relevance:** [Why this finding matters to the research question]

    [Repeat for up to 5 findings]
    ---

    ## 3. Preliminary Hypothesis
    [Your evidence-based hypothesis here]

    ## 4. Summary
    [One paragraph summary of your research findings]

expert_debate:
  description: >
    You are {name}, a {discipline} expert participating in a scientific symposium.

    Research Question: "{query}"

    === DEBATE TRANSCRIPT SO FAR ===
    {transcript}
    === END TRANSCRIPT ===

    Your Task:
    1. Review what your colleagues have said above.
    2. Present your evidence-based perspective on the research question.
    3. Explicitly respond to at least one claim made by a previous speaker —
       either supporting it with additional evidence or challenging it with a counter-argument.
    4. You may query the shared library to retrieve evidence supporting your points.
    5. Keep your contribution focused, substantive, and between 200-400 words.
  expected_output: >
    A substantive debate contribution using EXACTLY this markdown format. DO NOT deviate:

    [Turn X] **[Your Name]** ([Your Discipline]):
    [Your opening argument]

    **Response to Peers:**
    [Your explicit response to previous claims]

    **Evidence-Grounded Argument:**
    [Your main substantive contribution]
    ---

    The **Response to Peers** section should be removed, if the agent is the first 
    agent to contribute to the debate. If there are previous agents, the **Response to Peers**
    section should be a substantive response to their claims. 

rapporteur_synthesis:
  description: >
    Research Question: "{query}"

    === FULL DEBATE TRANSCRIPT ===
    {transcript}
    === END TRANSCRIPT ===

    === EVIDENCE SCORECARD ===
    {evidence_scorecard}
    === END SCORECARD ===

    Synthesize the debate into a concise unified hypothesis (150 words max).
    Weave together the strongest consensus points, acknowledge any irreconcilable
    disagreement, and state the unified position the evidence supports.
    Be direct — no headings, no bullet lists, just a tight paragraph.
  expected_output: >
    A single paragraph (150 words max) stating the unified hypothesis.
    No headings, no sections. Just the synthesis.

discussant_review:
  description: >
    Research Question: "{query}"

    === SYNTHESIS UNDER REVIEW ===
    {synthesis}
    === END SYNTHESIS ===

    === EVIDENCE SCORECARD ===
    {evidence_scorecard}
    === END SCORECARD ===

    Audit this synthesis as a discussant. Check for:
    1. Lazy consensus (agreement without evidence)
    2. Physical, chemical, or logical constraint violations
    3. Claims not supported by the evidence scorecard
    4. Ignored minority expert viewpoints
    5. Citations flagged as unverified or inaccessible in the evidence scorecard

    Return your verdict as a compact JSON object with:
      - "approved": true or false
      - "verdict": "APPROVED" or "REJECTED"
      - "issues": max 3 specific problems (one sentence each), empty if approved
      - "conflict_mandate": max 1 sentence instruction, or null if approved
    Keep every field concise. The issues list is for actionable problems, not commentary.
  expected_output: >
    A compact JSON object. Issues capped at 3. Mandate max 1 sentence.

rapporteur_rebuttal:
  description: >
    Research Question: "{query}"

    === YOUR ORIGINAL SYNTHESIS ===
    {synthesis}
    === END SYNTHESIS ===

    === DISCUSSANT CRITIQUE ===
    {discussant_critique}
    === END CRITIQUE ===

    === EVIDENCE SCORECARD ===
    {evidence_scorecard}
    === END SCORECARD ===

    The Discussant has rejected your synthesis. Address EVERY issue raised
    and return a revised paragraph (150 words max). If a criticism is
    unfounded, briefly note why — but focus on fixing real problems.
    Use the library_read tool to verify disputed claims.
  expected_output: >
    A revised single-paragraph synthesis (150 words max).

fact_checker_scorecard:
  description: >
    Research Question: "{query}"

    === DEBATE TRANSCRIPT ===
    {transcript}
    === END TRANSCRIPT ===

    Your task: Review the debate transcript and the shared research library.
    For each significant factual claim in the transcript:
    1. Query the library to find the supporting or contradicting evidence
    2. Map the claim to its source URL and note the verification_status
       (verified/misattributed/unverifiable) and source_quote from the library
    3. For "unverifiable" or "misattributed" sources, use web search to
       independently check whether the source_quote appears on the claimed URL
    4. If a claim has no supporting source, mark it as "UNCITED"

    Return a JSON array of evidence entries. Each entry must have:
      - "claim": the specific claim made
      - "agent_name": who made the claim
      - "source_url": the URL from the library (or "UNCITED" if no match found)
      - "verification_status": "verified", "misattributed", "unverifiable", or ""
      - "source_quote": the source quote from the library (or "" if none)
  expected_output: >
    A JSON array of evidence mapping objects.

aggregator_compile:
  description: >
    The following experts have each conducted independent research on the question:
    "{query}"

    Experts: {expert_names}

    Review each expert's findings (provided as context) and produce a structured
    summary with one section per expert. Each section should include:
    1. Expert name and discipline
    2. Their key findings (bullet points)
    3. Their preliminary hypothesis

    Keep each section concise (100-150 words max). Do not add new research —
    only organise and summarise what was found.
  expected_output: >
    A structured Markdown document with one section per expert summarising
    their research findings and preliminary hypothesis.

dossier_author_compile:
  description: >
    Compile the final research dossier for the following:

    Research Question: "{query}"
    Final Synthesis: {synthesis}
    Evidence Scorecard: {evidence_scorecard}
    Full Transcript: {transcript}
    Audit Rounds Completed: {audit_round}

    Format the output as a professional Markdown research document with these sections:
    1. **Abstract** (150 words max)
    2. **Expert Panel** (list of experts and their disciplines)
    3. **Key Findings by Discipline** (one subsection per expert)
    4. **Synthesis & Unified Hypothesis**
    5. **Dissenting Views & Open Questions**
    6. **Bibliography** — CRITICAL: Copy EXACTLY the source URLs and DOIs from the evidence
       scorecard. Do NOT attribute sources to the expert panel members — they are AI personas,
       not real researchers. Do NOT invent author names or paper titles. Each bibliography
       entry must be ONLY the raw URL or DOI from the scorecard, one per line. Sources
       marked as UNCITED or unverified should be listed as "⚠ UNCITED" or "⚠ UNVERIFIED".
  expected_output: >
    A complete, publication-ready Markdown research document using EXACTLY this format. DO NOT deviate:

    # COUNCIL Dossier: [Research Question]

    ## Abstract
    [150 words max summary]
    ---

    ## Expert Panel
    - **[Expert Name]**: [Discipline]
    - **[Expert Name]**: [Discipline]
    ---

    ## Key Findings by Discipline
    ### [Expert Name]
    [Summary of their findings]
    ---

    ## Synthesis & Unified Hypothesis
    [Final hypothesis]
    ---

    ## Dissenting Views & Open Questions
    [Areas of disagreement and future work]
    ---

    ## Bibliography
    - https://doi.org/10.1234/example
    - https://arxiv.org/abs/1234.5678
    - ⚠ UNCITED

expectation_curator_refine:
  description: >
    The user is convening a scientific symposium to investigate this question:

    "{query}"

    The user wants the symposium to produce: {expectation_type}
    Additional detail from the user: {expectation_detail}

    Your task: Translate the user's desired outcome into 3-5 concrete,
    measurable success criteria that the final synthesis must satisfy.

    Examples of what success criteria look like for different outcome types:
    - "Definitive Answer": The synthesis must pick a clear winning position
      with enumerated supporting evidence
    - "Feasible Plan": The synthesis must include specific steps, timelines,
      resource estimates, and risk assessments
    - "Balanced Overview": The synthesis must give equal weight to competing
      viewpoints and identify methodological strengths/weaknesses of each
    - "Research Roadmap": The synthesis must prioritize knowledge gaps by
      impact and feasibility
    - "Decision Analysis": The synthesis must score alternatives against
      explicit criteria and recommend one
    - "Hypothesis Evaluation": The synthesis must assess the hypothesis
      against available evidence with a confidence rating

    Return ONLY a numbered list of success criteria, one per line. No preamble.
    Each criterion should be a clear, testable statement that an evaluator can
    check against the synthesis.
  expected_output: >
    A numbered list of 3-5 success criteria.

expectation_evaluator_review:
  description: >
    Research Question: "{query}"

    === DESIRED OUTCOME ===
    {expectation_type}
    === END OUTCOME ===

    === SUCCESS CRITERIA ===
    {expectation_criteria}
    === END CRITERIA ===

    === SYNTHESIS UNDER REVIEW ===
    {synthesis}
    === END SYNTHESIS ===

    Evaluate whether the synthesis satisfies the success criteria. Your job is
    NOT to re-audit scientific rigor — that has already been done. Your job is
    only to check whether the output matches the user's desired outcome type.

    For each criterion, state whether it is SATISFIED or NOT SATISFIED with a
    brief explanation. Then give an overall verdict.

    Return a JSON object with:
      - "expectation_met": true or false
      - "verdict": "EXPECTATION_MET" or "EXPECTATION_NOT_MET"
      - "criteria_results": list of {{"criterion": "...", "satisfied": true/false, "note": "..."}}
      - "gaps": list of specific gaps to address in the next round (empty if met)
  expected_output: >
    A JSON object with keys: expectation_met (bool), verdict (string),
    criteria_results (list of objects), gaps (list of strings).
